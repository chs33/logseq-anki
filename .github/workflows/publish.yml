name: Publish plugin

on:
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Get package values
              uses: jarrettmeyer/github-action-package-values@v1
              id: package

            - uses: pnpm/action-setup@v3
              with:
                  version: 10

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 20
                  cache: "pnpm"
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run tests
              run: npx vitest run --reporter=verbose --reporter=json --outputFile=test-report.json

            - name: Build
              id: build
              run: |
                  pnpm run build
                  mkdir ${{ steps.package.outputs.package_name }}
                  cp README.md package.json icon.png ${{ steps.package.outputs.package_name }}
                  mv dist ${{ steps.package.outputs.package_name }}
                  cd ${{ steps.package.outputs.package_name }}
                  zip -r ${{ steps.package.outputs.package_name }}.zip *
                  cd ..
                  mv ${{ steps.package.outputs.package_name }}/${{ steps.package.outputs.package_name }}.zip ./
                  echo "::set-output name=tag_name::$(git tag --sort version:refname | tail -n 1)"

            - name: Generate Release Notes
              id: release_notes
              run: |
                  cat > release_notes.md << 'EOF'
                  ## What's Changed
                
                  Please see the commit history for detailed changes.

                  ## 🙏 Support

                  Loved the tool? Please consider [donating via GitHub Sponsors](https://github.com/sponsors/debanjandhar12) to help it improve!
                  EOF

            - name: Create Release
              uses: softprops/action-gh-release@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ steps.package.outputs.package_version }}
                  name: v${{ steps.package.outputs.package_version }}
                  draft: true
                  prerelease: false
                  generate_release_notes: true
                  body_path: release_notes.md
                  files: |
                      ./${{ steps.package.outputs.package_name }}.zip
                      ./test-report.json
